# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Site Settings
locale: "en-US"
title: "Musa Touray Portfolio"
title_separator: "|"
subtitle: "Data Analytics & Power BI Portfolio"
name: "Musa Touray"
description: "Portfolio showcasing Power BI, data visualization, and analytics automation projects by Microsoft certified professional Musa Touray."
url: "https://musatouray.github.io"
baseurl: ""
repository: "musatouray/musatouray.github.io"
teaser: # path of fallback teaser image
logo: "/assets/images/logo_2.png"
masthead_title: # overrides the website title displayed in the masthead
breadcrumbs: true
words_per_minute: 200

# Comments (Disqus)
comments:
  provider: "disqus"
  disqus:
    shortname: "portfoliowebsite"

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "UA-113961478-1"
    anonymize_ip: false

# Site Author
author:
  name: "Musa Touray"
  avatar: "/assets/images/musatouray-avatar.png"
  bio: "Microsoft certified Power BI and PowerApps developer specializing in data visualization, analytics automation, and real-time reporting solutions."
  location: "The Gambia"
  email: "amigomusa@amigomusa.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/musa-touray/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/musatouray"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/mosesgerrard"

# Site Footer
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/musa-touray/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/musatouray"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/mosesgerrard"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:title/
paginate: 10
paginate_path: /page:num/
timezone: UTC

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Collections
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
      sidebar:
        - title: "Certifications"
          text: |
            <div style="text-align: center;">
            <a href="https://www.credly.com/badges/ce7cb140-8334-4713-a786-0d1f463ae698" target="_blank" rel="noopener noreferrer"><img src="/assets/images/pl300.png" alt="PL-300" style="width:100%;max-width:150px;margin-bottom:10px;"></a>
            <a href="https://www.credly.com/badges/0c890e52-33f9-4111-ba2b-ae95c77d5864" target="_blank" rel="noopener noreferrer"><img src="/assets/images/pl100.png" alt="PL-100" style="width:100%;max-width:150px;margin-bottom:10px;"></a>
            <a href="https://www.credly.com/badges/2c01d8be-51cc-424d-9f86-4c2a5c93dc67" target="_blank" rel="noopener noreferrer"><img src="/assets/images/az900.png" alt="AZ-900" style="width:100%;max-width:150px;margin-bottom:10px;"></a>
            <a href="https://www.credly.com/badges/25ad2b9a-ef69-4d72-9b94-095b7f863053" target="_blank" rel="noopener noreferrer"><img src="/assets/images/pl900.png" alt="PL-900" style="width:100%;max-width:150px;margin-bottom:10px;"></a>
            </div>
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true
