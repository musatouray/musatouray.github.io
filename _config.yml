# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Site Settings
locale: "en-US"
title: "MusaDataJournal"
title_separator: "|"
subtitle: "How I do it"
name: "Musa Touray"
description: "Portfolio showcasing Power BI, data visualization, and analytics automation projects by Microsoft certified professional Musa Touray."
url: "https://musatouray.github.io"
baseurl: ""
repository: "musatouray/musatouray.github.io"
teaser: # path of fallback teaser image
logo: "/assets/images/logo_2.png"
masthead_title: # overrides the website title displayed in the masthead
breadcrumbs: true
words_per_minute: 200

# Comments (Disqus)
comments:
  provider: "disqus"
  disqus:
    shortname: "portfoliowebsite"

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "UA-113961478-1"
    anonymize_ip: false

# Site Author
author:
  name: "Musa Touray"
  avatar: "/assets/images/musatouray-avatar.png"
  bio: "Data Engineer, Analytics Engineer and Microsoft Certified Fabric Engineer"
  location: "New York, USA"
  email: "amigomusa@amigomusa.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/musa-touray/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/musatouray"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/mosesgerrard"

# Site Footer
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/musa-touray/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/musatouray"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/mosesgerrard"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:title/
paginate: 10
paginate_path: /page:num/
timezone: UTC

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Collections
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
